<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Pattern</title>
<style>
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 70px);
    gap: 8px;
    width: fit-content;
    margin: 40px auto;
  }

  .box {
    width: 70px;
    height: 70px;
  }

  .c1 { background: #ff7a00; }
  .c2 { background: #ffb77a; }
  .c3 { background: #9c4a00; }
</style>
</head>
<body>

<div class="grid">
  <div class="box c1"></div><div class="box c2"></div><div class="box c3"></div>
  <div class="box c1"></div><div class="box c2"></div><div class="box c3"></div>

  <div class="box c2"></div><div class="box c3"></div><div class="box c1"></div>
  <div class="box c2"></div><div class="box c3"></div><div class="box c1"></div>

  <div class="box c3"></div><div class="box c1"></div><div class="box c2"></div>
  <div class="box c3"></div><div class="box c1"></div><div class="box c2"></div>

  <div class="box c1"></div><div class="box c2"></div><div class="box c3"></div>
  <div class="box c1"></div><div class="box c2"></div><div class="box c3"></div>

  <div class="box c2"></div><div class="box c3"></div><div class="box c1"></div>
  <div class="box c2"></div><div class="box c3"></div><div class="box c1"></div>
</div>

</body>
</html>
